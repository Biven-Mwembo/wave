name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Clean previous iOS build
        run: rm -rf ios android

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Detect Xcode Workspace
        run: |
          cd ios
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | awk '/Schemes:/,/^$/' | tail -n +2 | head -n 1 | xargs)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Pre-build Expo Pods
        run: |
          cd ios
          
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | awk '/Schemes:/,/^$/' | tail -n +2 | head -n 1 | xargs)
          
          # First, build the pod frameworks needed by the app
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            -build \
            TARGET_PRODUCTS_DIR="$(pwd)/../DerivedData" \
            OTHER_CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO 2>&1 | tail -50

      - name: Build iOS App
        run: |
          cd ios

          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | awk '/Schemes:/,/^$/' | tail -n +2 | head -n 1 | xargs)

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Create IPA
        run: |
          cd ios

          APP=$(find . \
            -path "*Release-iphoneos/*.app" \
            | head -n 1)

          if [ -z "$APP" ]; then
            APP=$(find ~/Library/Developer/Xcode/DerivedData \
              -path "*Release-iphoneos/*.app" \
              | head -n 1)
          fi

          mkdir Payload
          cp -R "$APP" Payload/

          zip -r ../wave-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: wave-unsigned.ipa