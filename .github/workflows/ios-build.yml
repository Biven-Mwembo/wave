name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Production Unsigned IPA
        run: |
          # 1. Force a clean, native iOS directory structure to pull in your app.json settings
          npx expo prebuild --platform ios --no-install
          
          # 2. Tell the Expo engine to compile an offline standalone release build
          # This automatically bakes the JavaScript code bundle and icon assets straight inside
          npx expo run:ios --configuration Release --device --no-sign --no-install

      - name: Package App Bundle into Sideloadable IPA
        run: |
          # 3. Structure the compiled .app file into the 'Payload' format required by Sideloadly
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/ 2>/dev/null || cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app Payload/
          zip -r wave-unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: wave-unsigned.ipa