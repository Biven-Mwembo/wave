name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Updated to fix the deprecation warning
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Build Unsigned IPA using CocoaPods
        run: |
          cd ios
          pod install
          
          # Automatically find the workspace and scheme name dynamically
          WORKSPACE_NAME=$(ls -d *.xcworkspace | head -n 1)
          SCHEME_NAME=$(basename "$WORKSPACE_NAME" .xcworkspace)
          
          echo "Building Workspace: $WORKSPACE_NAME with Scheme: $SCHEME_NAME"
          
          xcodebuild -workspace "$WORKSPACE_NAME" \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -allowProvisioningUpdates \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     OBJROOT=$PWD/build \
                     SYMROOT=$PWD/build
                     
          mkdir -p Payload
          cp -r build/Release-iphoneos/*.app Payload/
          zip -r ../wave-unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: wave-unsigned.ipa