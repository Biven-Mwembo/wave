name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Base Dependencies
        run: npm ci

      - name: Inject Missing Native Audio Packages
        run: |
          npx expo install expo-av

      - name: Clean iOS Directory
        run: |
          rm -rf ios
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Force Offline Bundle & Asset Compilation
        run: |
          export NODE_ENV=production
          npx expo export:embed \
            --platform ios \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/ \
            --dev false

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App
        run: |
          cd ios
          
          WORKSPACE="./wave.xcworkspace"
          SCHEME="wave"
          
          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"
          
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tee build.log | tail -80
          
          echo ""
          echo "=== Check build result ==="
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✓ BUILD SUCCEEDED"
          else
            echo "✗ BUILD FAILED"
            exit 1
          fi

      - name: Inject JavaScript Bundle and Create IPA
        run: |
          cd ios
          
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "wave.app" -type d 2>/dev/null | head -n 1)
          echo "Target App Path: $APP"

          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "ERROR: Compiled app target not found"
            exit 1
          fi

          # Force copy the compiled JS code bundle and asset folders directly inside the native app layout
          echo "Injecting main.jsbundle and assets into $APP..."
          cp main.jsbundle "$APP/"
          cp -R assets "$APP/" 2>/dev/null || true
          cp -R _expo "$APP/" 2>/dev/null || true

          # Create Sideloadly compatible Payload wrapper
          mkdir Payload
          cp -R "$APP" Payload/
          zip -r ../wave-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: wave-unsigned.ipa