name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Clean iOS
        run: |
          rm -rf ios
          rm -rf ~/Library/Developer/Xcode/DerivedData/wave-*

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App
        run: |
          cd ios

          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | awk 'NR==3 {print $1}')

          set -o pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tee build.log

          echo ""
          echo "=== BUILD RESULT ==="
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "BUILD SUCCEEDED"
          else
            echo "BUILD FAILED - Check build.log for errors"
            tail -50 build.log
            exit 1
          fi

      - name: Debug - Find App Location
        run: |
          echo "=== Looking for .app ==="
          
          # Search multiple possible locations
          find ~/Library/Developer/Xcode/DerivedData \
            -name "*.app" -type d 2>/dev/null | head -10
          
          echo ""
          echo "=== Recent build products ==="
          find ~/Library/Developer/Xcode/DerivedData \
            -name "wave.app" -type d 2>/dev/null
          
          echo ""
          echo "=== Any Release-iphoneos products ==="
          find ~/Library/Developer/Xcode/DerivedData \
            -path "*Release-iphoneos*" -name "*.app" 2>/dev/null | head -5

      - name: Create IPA
        run: |
          cd ios

          # Try to find the app
          APP=""
          
          # Search in DerivedData
          for app in $(find ~/Library/Developer/Xcode/DerivedData -name "wave.app" -type d 2>/dev/null); do
            if [[ "$app" == *"Release"* ]]; then
              APP="$app"
              break
            fi
          done
          
          # Fallback: search any Release app
          if [ -z "$APP" ]; then
            APP=$(find ~/Library/Developer/Xcode/DerivedData -path "*Release-iphoneos*" -name "*.app" -type d | head -n 1)
          fi
          
          echo "Found app: $APP"
          
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "ERROR: App not found in any location"
            ls -la ~/Library/Developer/Xcode/DerivedData/
            exit 1
          fi

          mkdir Payload
          cp -R "$APP" Payload/
          zip -r ../wave-unsigned.ipa Payload
          ls -la ../wave-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: wave-unsigned.ipa