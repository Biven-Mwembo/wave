name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Clean iOS
        run: |
          rm -rf ios
          rm -rf ~/Library/Developer/Xcode/DerivedData/wave-*

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Detect Workspace and Scheme
        run: |
          cd ios
          
          WORKSPACE=$(find . -name "*.xcworkspace" -type d | head -n 1)
          echo "Workspace: $WORKSPACE"
          
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>&1 | tail -n +3 | head -n 1)
          SCHEME=$(echo "$SCHEME" | xargs)
          echo "Scheme: $SCHEME"
          
          # Save to file for next step
          echo "WORKSPACE_PATH=$WORKSPACE" > build_env.txt
          echo "SCHEME_NAME=$SCHEME" >> build_env.txt
          cat build_env.txt

      - name: Build iOS App
        run: |
          cd ios
          
          source build_env.txt
          echo "Workspace: $WORKSPACE_PATH"
          echo "Scheme: $SCHEME_NAME"
          
          xcodebuild \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tail -50

      - name: Create IPA
        run: |
          cd ios

          APP=$(find ~/Library/Developer/Xcode/DerivedData \
            -path "*Release-iphoneos*" -name "wave.app" -type d 2>/dev/null | head -n 1)

          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "ERROR: App not found"
            find ~/Library/Developer/Xcode/DerivedData -name "*.app" 2>/dev/null | head -5
            exit 1
          fi

          echo "Found app at: $APP"
          mkdir Payload
          cp -R "$APP" Payload/
          zip -r ../wave-unsigned.ipa Payload
          ls -la ../wave-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: wave-unsigned.ipa