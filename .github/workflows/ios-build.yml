name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Clean iOS completely
        run: |
          rm -rf ios
          rm -rf ~/Library/Developer/Xcode/DerivedData/wave-hbdtgtyqypfshvcwghgjisjwxgwd

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods (Fresh)
        run: |
          cd ios
          # Remove any stale files that could corrupt pod install
          rm -rf Pods Podfile.lock build DerivedData
          # Fresh, verbose pod install
          pod install --verbose

      - name: Verify Targets
        run: |
          cd ios
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          
          echo "=== Schemes ===" 
          xcodebuild -workspace "$WORKSPACE" -list
          
          echo ""
          echo "=== Pod Targets Registered ==="
          # Check that pods created targets
          xcodeproj=$(find . -name "*.xcodeproj" | head -n 1)
          ls "$xcodeproj/project.xcproject" | head -20
          
          # Check if ExpoModulesCore has a target
          if grep -q "ExpoModulesCore" "$xcodeproj/project.pbxproj"; then
            echo "✓ ExpoModulesCore target found"
          else
            echo "✗ ExpoModulesCore target MISSING"
          fi

      - name: Build iOS App
        run: |
          cd ios

          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list | awk 'NR==3 {print $1}')

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData/wave-hbdtgtyqypfshvcwghgjisjwxgwd \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tail -100

      - name: Create IPA
        run: |
          cd ios

          APP=$(find ~/Library/Developer/Xcode/DerivedData/wave-hbdtgtyqypfshvcwghgjisjwxgwd \
            -path "*Release-iphoneos/*.app" | head -n 1)

          if [ -z "$APP" ]; then
            echo "ERROR: App not found"
            exit 1
          fi

          mkdir Payload
          cp -R "$APP" Payload/
          zip -r ../wave-unsigned.ipa Payload
          ls -la ../wave-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: wave-unsigned.ipa