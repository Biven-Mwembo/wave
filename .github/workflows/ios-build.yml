name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Additional Packages
        run: |
          npx expo install expo-av
          npm install @react-native-async-storage/async-storage

      - name: Clean iOS
        run: |
          rm -rf ios
          rm -rf ~/Library/Developer/Xcode/DerivedData/wave-*

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Bundle JavaScript using Expo
        run: |
          cd ios
          
          # Use expo to export the bundle
          npx expo export:embed \
            --platform ios \
            --entry-file ../index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/assets \
            --dev false 2>&1
          
          echo ""
          echo "=== Bundle file ==="
          ls -la ios/main.jsbundle || echo "No bundle file found"

      - name: Build iOS App
        run: |
          cd ios
          
          WORKSPACE="./wave.xcworkspace"
          SCHEME="wave"
          
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData/wave-build \
            build 2>&1 | tee build.log | tail -30
          
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✓ BUILD SUCCEEDED"
          else
            echo "✗ BUILD FAILED"
            exit 1
          fi

      - name: Copy Bundle to App
        run: |
          cd ios
          
          APP=$(find ~/Library/Developer/Xcode/DerivedData/wave-build -name "wave.app" -type d | head -n 1)
          
          if [ -f "main.jsbundle" ]; then
            cp main.jsbundle "$APP/"
          fi
          
          if [ -d "assets" ]; then
            cp -R assets "$APP/" || true
          fi
          
          echo "=== App Contents ==="
          ls -la "$APP"

      - name: Create IPA
        run: |
          cd ios
          
          APP=$(find ~/Library/Developer/Xcode/DerivedData/wave-build -name "wave.app" -type d | head -n 1)
          
          mkdir Payload
          cp -R "$APP" Payload/
          zip -r ../wave-unsigned.ipa Payload
          ls -la ../wave-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: wave-unsigned.ipa