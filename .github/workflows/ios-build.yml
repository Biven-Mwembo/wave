name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Clean iOS
        run: |
          rm -rf ios
          rm -rf ~/Library/Developer/Xcode/DerivedData/wave-*

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Debug Workspace Structure
        run: |
          cd ios
          
          echo "=== Files in ios/ ==="
          ls -la
          
          echo ""
          echo "=== Finding workspace ==="
          WORKSPACE=$(find . -name "*.xcworkspace" -type d)
          echo "Workspace: $WORKSPACE"
          
          echo ""
          echo "=== Listing schemes ==="
          xcodebuild -workspace "$WORKSPACE" -list
          
          echo ""
          echo "=== Direct structure ==="
          find . -maxdepth 2 -type d

      - name: Build iOS App
        run: |
          cd ios
          
          WORKSPACE=$(find . -name "*.xcworkspace" -type d | head -n 1)
          
          # Get scheme more reliably
          SCHEME_LIST=$(xcodebuild -workspace "$WORKSPACE" -list 2>&1)
          SCHEME=$(echo "$SCHEME_LIST" | grep "^    " | head -1 | xargs)
          
          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: '$SCHEME'"
          
          # Verify scheme is not empty
          if [ -z "$SCHEME" ]; then
            echo "ERROR: Scheme is empty!"
            echo "Full scheme list:"
            echo "$SCHEME_LIST"
            exit 1
          fi
          
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tee build.log | tail -80
          
          echo ""
          echo "=== Check build result ==="
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✓ BUILD SUCCEEDED"
          else
            echo "✗ BUILD FAILED"
            exit 1
          fi

      - name: Create IPA
        run: |
          cd ios

          echo "=== Looking for app ==="
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" 2>/dev/null
          
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "wave.app" -type d 2>/dev/null | head -n 1)
          
          echo "App path: $APP"

          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "ERROR: App not found"
            exit 1
          fi

          mkdir Payload
          cp -R "$APP" Payload/
          zip -r ../wave-unsigned.ipa Payload
          ls -la ../wave-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: wave-unsigned.ipa