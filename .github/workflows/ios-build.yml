name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Base Dependencies
        run: npm ci

      - name: Install Additional Packages
        run: |
          npx expo install expo-av
          npm install @react-native-async-storage/async-storage

      - name: Clean iOS Directory
        run: |
          rm -rf ios
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS App with Bundled JS
        run: |
          cd ios
          
          WORKSPACE="./wave.xcworkspace"
          SCHEME="wave"
          
          echo "=== Building with workspace: $WORKSPACE, scheme: $SCHEME ==="
          
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ~/Library/Developer/Xcode/DerivedData/wave-build \
            build 2>&1 | tee build.log | tail -100
          
          echo ""
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✓ BUILD SUCCEEDED"
          else
            echo "✗ BUILD FAILED"
            tail -30 build.log
            exit 1
          fi

      - name: Verify JS Bundle is in App
        run: |
          # Find the built app
          APP=$(find ~/Library/Developer/Xcode/DerivedData/wave-build -name "wave.app" -type d | head -n 1)
          
          echo "App location: $APP"
          
          if [ ! -d "$APP" ]; then
            echo "ERROR: App not found"
            exit 1
          fi
          
          echo ""
          echo "=== Contents of app bundle ==="
          ls -la "$APP"
          
          echo ""
          echo "=== Checking for main.jsbundle ==="
          if [ -f "$APP/main.jsbundle" ]; then
            echo "✓ main.jsbundle FOUND"
          else
            echo "✗ main.jsbundle NOT FOUND"
            echo "Files in app:"
            ls -laR "$APP" | head -30
            exit 1
          fi

      - name: Create IPA
        run: |
          cd ios
          
          APP=$(find ~/Library/Developer/Xcode/DerivedData/wave-build -name "wave.app" -type d | head -n 1)
          
          if [ -z "$APP" ]; then
            echo "ERROR: App not found"
            exit 1
          fi
          
          echo "Creating IPA from: $APP"
          
          mkdir Payload
          cp -R "$APP" Payload/
          zip -r ../wave-unsigned.ipa Payload
          
          ls -la ../wave-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: wave-unsigned.ipa